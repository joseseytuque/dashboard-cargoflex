<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Importaciones - CargoFlex Supply</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f1a; font-family: "Exo 2", sans-serif; height: 100vh; overflow: hidden; }

  .screen { display:none; flex-direction:column; height:100vh; padding:16px 22px 12px; animation:fadeIn 0.5s ease; }
  .screen.active { display:flex; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom:12px; border-bottom:2px solid #39ff14; }
  .header-left { display:flex; align-items:center; gap:18px; }
  .logo-wrapper { background:#ffffff; border-radius:10px; padding:8px 16px; display:flex; align-items:center; box-shadow:0 0 20px rgba(57,255,20,0.4); }
  .logo-img { height:46px; width:auto; display:block; }
  .board-title { font-family:"Rajdhani",sans-serif; font-size:30px; font-weight:700; color:#ffffff; letter-spacing:3px; text-transform:uppercase; text-shadow:0 0 15px #39ff14; }
  .board-subtitle { font-size:11px; color:#39ff14; letter-spacing:3px; text-transform:uppercase; margin-top:2px; }
  .clock { font-family:"Rajdhani",sans-serif; font-size:42px; font-weight:700; color:#fff; letter-spacing:4px; text-shadow:0 0 18px #39ff14; text-align:right; }
  .date-display { font-size:11px; color:#aaffaa; letter-spacing:2px; text-transform:uppercase; margin-top:2px; text-align:right; }

  .status-banner { display:flex; align-items:center; justify-content:center; gap:14px; padding:11px 20px; border-radius:10px; margin-bottom:12px; font-family:"Rajdhani",sans-serif; font-size:36px; font-weight:700; letter-spacing:5px; text-transform:uppercase; }
  .status-banner.canal-rojo { background:#1a0000; border:2px solid #ff1744; color:#ff1744; animation:redalert 1.2s ease-in-out infinite; }
  @keyframes redalert { 0%,100%{box-shadow:0 0 20px rgba(255,23,68,0.4);}50%{box-shadow:0 0 50px rgba(255,23,68,0.8);} }
  .status-banner.nacionalizacion { background:#1a1500; border:2px solid #ffea00; color:#ffea00; box-shadow:0 0 25px rgba(255,234,0,0.4); }
  .status-banner.en-transito { background:#001a00; border:2px solid #39ff14; color:#39ff14; box-shadow:0 0 25px rgba(57,255,20,0.4); }
  .status-banner.en-origen { background:#001a10; border:2px solid #00e5ff; color:#00e5ff; box-shadow:0 0 25px rgba(0,229,255,0.4); }
  .status-banner.liberado { background:#001a00; border:2px solid #00ff88; color:#00ff88; box-shadow:0 0 25px rgba(0,255,136,0.4); }
  .status-count { font-size:20px; opacity:0.7; }

  .table-container { border-radius:12px; overflow:hidden; flex:1; border:1px solid #2a2a3a; }
  .table-header { display:grid; grid-template-columns:46px 120px 150px 98px 98px 120px 60px 80px 110px; background:#1a1a2e; padding:11px 16px; gap:8px; border-bottom:2px solid #39ff14; }
  .th { font-size:12px; font-weight:700; color:#39ff14; letter-spacing:2px; text-transform:uppercase; }

  .table-row { display:grid; grid-template-columns:46px 120px 150px 98px 98px 120px 60px 80px 110px; padding:14px 16px; gap:8px; border-bottom:1px solid #1e1e2e; align-items:center; background:#12121f; transition:background 0.2s; }
  .table-row:nth-child(even) { background:#0f0f1a; }
  .table-row:last-child { border-bottom:none; }
  .table-row:hover { background:#1e1e35; }
  .table-row.highlight { background:#1a0808; animation:rowpulse 2s ease-in-out infinite; }
  @keyframes rowpulse { 0%,100%{background:#1a0808;}50%{background:#220d0d;} }

  .td { font-size:17px; color:#d0d8f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .td.num { font-family:"Rajdhani",sans-serif; font-size:16px; color:#444466; font-weight:700; }
  .td.ref { font-family:"Rajdhani",sans-serif; color:#39ff14; font-weight:700; font-size:19px; letter-spacing:1px; }
  .td.client { color:#ffffff; font-weight:800; font-size:18px; }
  .td.date { color:#8888aa; font-size:15px; }

  .footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:8px; border-top:1px solid #2a2a3a; font-size:11px; color:#444466; letter-spacing:1.5px; text-transform:uppercase; }
  .live-dot { display:inline-block; width:9px; height:9px; background:#39ff14; border-radius:50%; margin-right:8px; box-shadow:0 0 10px #39ff14; animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1;}50%{opacity:0.1;} }

  .progress-bar { height:4px; background:#1a1a2e; border-radius:2px; margin-top:8px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#39ff14,#ffea00,#ff1744); border-radius:2px; width:0%; transition:width 0.1s linear; }

  .screen-indicator { display:flex; gap:7px; align-items:center; }
  .dot { width:9px; height:9px; border-radius:50%; background:#2a2a3a; transition:all 0.3s; }
  .dot.active { background:#39ff14; box-shadow:0 0 8px #39ff14; }

  .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:20px; }
  .loading-text { font-family:"Rajdhani",sans-serif; font-size:24px; color:#39ff14; letter-spacing:3px; animation:blink 1.5s infinite; }
  .error-text { font-family:"Rajdhani",sans-serif; font-size:18px; color:#ff1744; letter-spacing:2px; text-align:center; padding:20px; line-height:1.6; }
  .retry-btn { margin-top:20px; padding:12px 30px; background:#1a1a2e; border:2px solid #39ff14; color:#39ff14; font-family:"Rajdhani",sans-serif; font-size:18px; letter-spacing:2px; border-radius:8px; cursor:pointer; }
  .retry-btn:hover { background:#39ff14; color:#000; }
</style>
</head>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQItpU8rNT3-5VlmVsrXyCcicvc8NORNVSzJ8JDcKa_j_5Linf213i4b0aZde_0dMFAwgHFIUfkQvgO/pub?gid=0&single=true&output=csv";

// Intentamos 3 métodos distintos para evitar CORS
async function fetchCSV() {
  const proxies = [
    // Método 1: directo (funciona si el browser lo permite)
    CSV_URL,
    // Método 2: allorigins proxy
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(CSV_URL),
    // Método 3: corsproxy
    "https://corsproxy.io/?" + encodeURIComponent(CSV_URL),
  ];

  for (const url of proxies) {
    try {
      const resp = await fetch(url, { cache: "no-store" });
      if (resp.ok) {
        const text = await resp.text();
        if (text.includes(",") && text.length > 10) return text;
      }
    } catch(e) {
      continue;
    }
  }
  throw new Error("No se pudo conectar. Verifica la conexión a internet.");
}

const ORDER = ["canal-rojo","nacionalizacion","en-transito","en-origen","liberado"];
const LABELS = {
  "canal-rojo":      "🚨 CANAL ROJO",
  "nacionalizacion": "⚡ NACIONALIZACIÓN",
  "en-transito":     "✈  EN TRÁNSITO",
  "en-origen":       "📦 EN ORIGEN",
  "liberado":        "✅ LIBERADO"
};

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const raw = lines[0].split(",").map(h => h.trim().replace(/\r/g,"").replace(/^"|"$/g,"").toLowerCase());
  return lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.trim().replace(/\r/g,"").replace(/^"|"$/g,""));
    const obj = {};
    raw.forEach((h,i) => obj[h] = vals[i] || "");
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function getBadgeClass(e) {
  const s = (e||"").toLowerCase();
  if (s.includes("canal")) return "canal-rojo";
  if (s.includes("liberado")) return "liberado";
  if (s.includes("nacion")) return "nacionalizacion";
  if (s.includes("tr") && s.includes("nsito")) return "en-transito";
  if (s.includes("origen")) return "en-origen";
  return "en-transito";
}

function formatDate(val) {
  if (!val) return "-";
  const n = parseFloat(val);
  if (!isNaN(n) && n > 40000) {
    const d = new Date((n - 25569) * 86400 * 1000);
    return d.toLocaleDateString("es-PE", {day:"2-digit", month:"short", year:"2-digit"});
  }
  return val;
}

function getField(row, ...keys) {
  for (const k of keys) {
    const val = row[k.toLowerCase()];
    if (val !== undefined && val !== "") return val;
  }
  return "";
}

let current = 0, elapsed = 0;
const DURATION = 10000, TICK = 100;
let activeGroups = [];
let rotationTimer = null;

function showScreen(idx) {
  document.querySelectorAll(".screen").forEach((s,i) => s.classList.toggle("active", i===idx));
  elapsed = 0;
}

function updateClocks() {
  const now = new Date();
  const t = now.toLocaleTimeString("es-PE");
  const dt = now.toLocaleDateString("es-PE", {weekday:"long",day:"numeric",month:"long",year:"numeric"});
  document.querySelectorAll(".clock-live").forEach(el => el.textContent = t);
  document.querySelectorAll(".date-live").forEach(el => el.textContent = dt);
  activeGroups.forEach((_,i) => {
    const el = document.getElementById("update-"+i);
    if (el) el.textContent = "Actualizado: " + t;
  });
}

function buildDashboard(data) {
  const filtered = data
    .filter(r => {
      const supply = getField(r, "supply", "Supply", "SUPPLY").trim().toLowerCase();
      const estatus = getField(r, "estatus", "Estatus", "ESTATUS").trim().toLowerCase();
      return supply === "si" && !estatus.includes("concluido");
    })
    .sort((a,b) => {
      const etaA = parseFloat(getField(a,"eta","ETA","Eta")) || 0;
      const etaB = parseFloat(getField(b,"eta","ETA","Eta")) || 0;
      return etaA - etaB;
    });

  const groups = {};
  ORDER.forEach(k => groups[k] = []);
  filtered.forEach(row => {
    const estatus = getField(row, "estatus", "Estatus", "ESTATUS");
    const bc = getBadgeClass(estatus);
    if (groups[bc]) groups[bc].push(row);
  });

  activeGroups = ORDER.filter(k => groups[k].length > 0);

  if (activeGroups.length === 0) {
    document.getElementById("app").innerHTML =
      '<div class="loading-screen"><div class="logo-wrapper"><img src="' + LOGO_SRC + '" style="height:60px;"/></div>'
      + '<div class="error-text">No hay cargas activas con Supply = SI</div></div>';
    return;
  }

  const container = document.createElement("div");

  activeGroups.forEach((status, idx) => {
    const rows = groups[status];
    const div = document.createElement("div");
    div.className = "screen" + (idx === 0 ? " active" : "");

    const dots = activeGroups.map((_,i) =>
      '<div class="dot' + (i===idx?" active":"") + '"></div>'
    ).join("");

    const rowsHTML = rows.map((row, i) => {
      const etd = getField(row,"etd","ETD","Etd");
      const eta = getField(row,"eta","ETA","Eta");
      const ref = getField(row,"referencia","Referencia","REFERENCIA","ref","REF");
      const client = getField(row,"cliente","Cliente","CLIENTE");
      const transport = getField(row,"tipo transporte","tipo_transporte","transporte","Tipo Transporte","TIPO TRANSPORTE");
      const bultos = getField(row,"bultos","Bultos","BULTOS");
      const origen = getField(row,"origen","Origen","ORIGEN");
      const producto = getField(row,"producto","Producto","PRODUCTO");
      const icon = transport.toLowerCase().includes("aér") || transport.toLowerCase().includes("aer") ? "✈" : "🚢";

      return '<div class="table-row' + (status==="canal-rojo"?" highlight":"") + '">'
        + '<div class="td num">' + String(i+1).padStart(2,"0") + '</div>'
        + '<div class="td ref">' + ref + '</div>'
        + '<div class="td client">' + client + '</div>'
        + '<div class="td date">' + formatDate(etd) + '</div>'
        + '<div class="td date">' + formatDate(eta) + '</div>'
        + '<div class="td">' + icon + ' ' + transport + '</div>'
        + '<div class="td">' + bultos + '</div>'
        + '<div class="td">' + origen + '</div>'
        + '<div class="td">' + producto + '</div>'
        + '</div>';
    }).join("");

    div.innerHTML =
      '<div class="header">'
      + '<div class="header-left"><div class="logo-wrapper"><img src="' + LOGO_SRC + '" class="logo-img" alt="CargoFlex"/></div>'
      + '<div><div class="board-title">Llegadas de Importaciones</div><div class="board-subtitle">Control de Ingreso · Almacén Lima</div></div></div>'
      + '<div><div class="clock clock-live">--:--:--</div><div class="date-display date-live">cargando...</div></div>'
      + '</div>'
      + '<div class="status-banner ' + status + '">' + LABELS[status] + '<span class="status-count"> (' + rows.length + ' carga' + (rows.length>1?"s":"") + ')</span></div>'
      + '<div class="table-container">'
      + '<div class="table-header"><div class="th">#</div><div class="th">Ref.</div><div class="th">Cliente</div><div class="th">ETD</div><div class="th">ETA</div><div class="th">Transporte</div><div class="th">Bultos</div><div class="th">Origen</div><div class="th">Producto</div></div>'
      + '<div class="table-body">' + rowsHTML + '</div>'
      + '</div>'
      + '<div class="footer">'
      + '<div><span class="live-dot"></span>Actualización automática cada 5 minutos</div>'
      + '<div style="display:flex;align-items:center;gap:14px;"><div class="screen-indicator">' + dots + '</div>'
      + '<div id="update-' + idx + '" style="color:#444466;font-size:11px;letter-spacing:1px;">--:--:--</div></div>'
      + '</div>'
      + '<div class="progress-bar"><div class="progress-fill" id="progress-' + idx + '"></div></div>';

    container.appendChild(div);
  });

  document.getElementById("app").innerHTML = "";
  document.getElementById("app").appendChild(container);
  current = 0;
  updateClocks();

  if (rotationTimer) clearInterval(rotationTimer);
  rotationTimer = setInterval(() => {
    elapsed += TICK;
    const p = document.getElementById("progress-" + current);
    if (p) p.style.width = Math.min((elapsed/DURATION)*100, 100) + "%";
    if (elapsed >= DURATION) { current = (current+1) % activeGroups.length; showScreen(current); }
  }, TICK);
}

function showError(msg) {
  document.getElementById("app").innerHTML =
    '<div class="loading-screen">'
    + '<div class="logo-wrapper"><img src="' + LOGO_SRC + '" style="height:60px;" alt="CargoFlex"/></div>'
    + '<div class="error-text">⚠ ' + msg + '</div>'
    + '<button class="retry-btn" onclick="loadData()">⟳ REINTENTAR</button>'
    + '</div>';
}

async function loadData() {
  document.getElementById("app").innerHTML =
    '<div class="loading-screen">'
    + '<div class="logo-wrapper"><img src="' + LOGO_SRC + '" style="height:60px;" alt="CargoFlex"/></div>'
    + '<div class="loading-text">⟳ ACTUALIZANDO DATOS...</div>'
    + '</div>';
  try {
    const text = await fetchCSV();
    const data = parseCSV(text);
    if (!data.length) throw new Error("El archivo está vacío o no tiene datos válidos.");
    buildDashboard(data);
  } catch(e) {
    showError(e.message);
  }
}

loadData();
setInterval(updateClocks, 1000);
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
